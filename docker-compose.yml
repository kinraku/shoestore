services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: kai
      POSTGRES_DB: shoestoredb
      POSTGRES_HOST_AUTH_METHOD: trust   
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shoestoredb.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./import_data.sql:/docker-entrypoint-initdb.d/02_data.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kai -d shoestoredb"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    environment:
      DATABASE_URL: postgresql://kai:@db:5432/shoestoredb
    ports:
      - "5008:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: python app.py

volumes:
  postgres_data: